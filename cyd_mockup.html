<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYD Music Controller — Cover Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 24px;
    }

    .device-frame {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08), 0 20px 60px rgba(0, 0, 0, 0.6);
      position: relative;
    }

    .device-label {
      position: absolute;
      top: -10px;
      right: 18px;
      background: #1a1a2e;
      padding: 0 8px;
      font-size: 0.6rem;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #cyd {
      width: 320px;
      height: 240px;
      background: #000;
      display: block;
      cursor: grab;
      border-radius: 4px;
    }

    #cyd:active {
      cursor: grabbing;
    }

    .info-panel {
      margin-top: 24px;
      text-align: center;
      max-width: 400px;
    }

    .info-panel .status {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 12px;
      min-height: 20px;
    }

    .info-panel .status .album-name {
      color: #1db954;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .controls button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #ccc;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    .legend {
      margin-top: 16px;
      font-size: 0.65rem;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <h1>🎵 CYD Cover Flow — iPod Style</h1>
  <p class="subtitle">320 × 240 px · Albums rotate and fold away as you scroll</p>

  <div class="device-frame">
    <span class="device-label">ESP32-2432S028 (CYD)</span>
    <canvas id="cyd" width="320" height="240"></canvas>
  </div>

  <div class="info-panel">
    <div class="status" id="status">Swipe to flip through albums</div>
    <div class="controls">
      <button onclick="goToAlbum(0)">⏮ First</button>
      <button onclick="goToAlbum(2)">Dark Side</button>
      <button onclick="goToAlbum(5)">Last</button>
      <button onclick="toggleSlowMotion()">🐢 Slow-Mo</button>
    </div>
    <div class="legend">
      <strong>3D Effect:</strong> Side albums rotate away in perspective · Center album faces you square-on<br>
      <strong>On CYD:</strong> Simulated with horizontal squish (no GPU transforms needed)
    </div>
  </div>

  <script>
    const canvas = document.getElementById('cyd');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    const ALBUM_COUNT = 6;
    const SCREEN_W = 320;
    const SCREEN_H = 240;

    // Cover Flow layout
    const CENTER_SIZE = 120;
    const SIDE_SIZE = 100;   // Height stays close, width shrinks to simulate rotation
    const SIDE_OFFSET = 95;    // X offset for ±1 albums
    const FAR_SIZE = 80;
    const FAR_OFFSET = 145;

    const albumColors = [
      [231, 76, 60], [52, 152, 219], [46, 204, 113],
      [243, 156, 18], [155, 89, 182], [26, 188, 156],
    ];
    const albumNames = ["Rumours", "OK Computer", "Dark Side", "Abbey Road", "Nevermind", "Kind of Blue"];

    // --- Scroll state ---
    let scroll_pos = 0.0;
    let target_scroll = 0.0;

    // --- Touch state ---
    let is_dragging = false;
    let touch_start_x = 0;
    let scroll_start = 0;
    let touch_start_time = 0;
    let momentum_velocity = 0;
    let last_tx = 0;
    let slowMotion = false;

    // ====== FLUID SCROLL TUNING ======
    const DRAG_SENSITIVITY = 180;  // Higher = less twitchy
    const MOMENTUM_MULT = 3.5;    // Subtle glide
    const EASE_SPEED = 6.0;       // Smooth snap
    const OVERSCROLL = 0.3;       // Subtle overscroll

    function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

    function drawRoundRect(x, y, w, h, r, color) {
      if (w <= 0 || h <= 0) return;
      r = Math.min(r, w / 2, h / 2);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
    }

    // Draw album art with perspective squish (scaleX < 1 = rotated away)
    function drawAlbumArt(cx, cy, height, scaleX, colorArr, index, brightness) {
      const h = Math.round(height);
      const w = Math.round(height * scaleX);
      if (w < 4 || h < 4) return;

      const x = Math.round(cx - w / 2);
      const y = Math.round(cy - h / 2);

      const br = Math.max(0, Math.min(1, brightness));
      const r = Math.round(colorArr[0] * br);
      const g = Math.round(colorArr[1] * br);
      const b = Math.round(colorArr[2] * br);
      const col = `rgb(${r},${g},${b})`;
      const rad = Math.max(2, Math.round(12 * scaleX));

      drawRoundRect(x, y, w, h, rad, col);

      // Draw art detail (simplified for small/squished albums)
      if (w < 30) return;

      const white = `rgba(255,255,255,${br})`;
      const black = `rgba(0,0,0,${br})`;

      ctx.save();
      // Clip to album bounds
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();

      switch (index % 6) {
        case 0: // Vinyl
          ctx.fillStyle = black;
          ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.33, h * 0.33, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = col;
          ctx.beginPath(); ctx.ellipse(cx, cy, w * 0.1, h * 0.1, 0, 0, Math.PI * 2); ctx.fill();
          // Grooves
          ctx.strokeStyle = `rgba(40,40,40,${br * 0.5})`;
          ctx.lineWidth = 0.5;
          for (let gr = h * 0.15; gr < h * 0.33; gr += 4) {
            ctx.beginPath(); ctx.ellipse(cx, cy, gr * scaleX, gr, 0, 0, Math.PI * 2); ctx.stroke();
          }
          break;
        case 1: // Window
          ctx.fillStyle = white;
          ctx.fillRect(x + w * 0.2, y + h * 0.25, w * 0.22, h * 0.2);
          ctx.fillRect(x + w * 0.55, y + h * 0.25, w * 0.22, h * 0.2);
          ctx.fillRect(x + w * 0.2, y + h * 0.55, w * 0.22, h * 0.2);
          ctx.fillRect(x + w * 0.55, y + h * 0.55, w * 0.22, h * 0.2);
          break;
        case 2: // Prism
          ctx.fillStyle = white;
          ctx.beginPath();
          ctx.moveTo(cx, y + h * 0.25); ctx.lineTo(x + w * 0.25, y + h * 0.75); ctx.lineTo(x + w * 0.75, y + h * 0.75);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle = white; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(cx, y + h * 0.25); ctx.stroke();
          break;
        case 3: // Stripes
          ctx.fillStyle = white; ctx.fillRect(x + w * 0.18, y + h * 0.2, w * 0.16, h * 0.6);
          ctx.fillStyle = black; ctx.fillRect(x + w * 0.43, y + h * 0.2, w * 0.16, h * 0.6);
          ctx.fillStyle = white; ctx.fillRect(x + w * 0.68, y + h * 0.2, w * 0.16, h * 0.6);
          break;
        case 4: // Waves
          ctx.strokeStyle = white; ctx.lineWidth = Math.max(1, 2 * scaleX);
          for (let i = 0; i < 5; i++) {
            const yy = y + h * 0.18 + i * h * 0.14;
            ctx.beginPath(); ctx.moveTo(x + w * 0.15, yy);
            ctx.lineTo(x + w * 0.85, yy + (i % 2 === 0 ? h * 0.05 : -h * 0.05)); ctx.stroke();
          }
          break;
        case 5: // Blocks
          drawRoundRect(x + w * 0.18, y + h * 0.2, w * 0.64, h * 0.28, 3, white);
          drawRoundRect(x + w * 0.5, y + h * 0.58, w * 0.3, h * 0.2, 3, black);
          drawRoundRect(x + w * 0.18, y + h * 0.58, w * 0.24, h * 0.2, 3, black);
          break;
      }
      ctx.restore();
    }

    // Cover Flow transform: returns { height, scaleX, xPos, brightness }
    function getCoverFlowTransform(offset) {
      const absOff = Math.abs(offset);
      const sign = offset < 0 ? -1 : (offset > 0 ? 1 : 0);

      let height, scaleX, xPos, brightness;

      if (absOff <= 1.0) {
        // Center → side: album rotates from square to angled
        height = lerp(CENTER_SIZE, SIDE_SIZE, absOff);
        scaleX = lerp(1.0, 0.55, absOff);   // Less extreme rotation
        xPos = SCREEN_W / 2 + sign * lerp(0, SIDE_OFFSET, Math.pow(absOff, 0.7));
        brightness = lerp(1.0, 0.6, absOff);
      } else if (absOff <= 2.0) {
        const t = absOff - 1.0;
        height = lerp(SIDE_SIZE, FAR_SIZE, t);
        scaleX = lerp(0.55, 0.40, t);
        xPos = SCREEN_W / 2 + sign * lerp(SIDE_OFFSET, FAR_OFFSET, t);
        brightness = lerp(0.6, 0.35, t);
      } else {
        const t = Math.min(absOff - 2.0, 1.0);
        height = lerp(FAR_SIZE, 40, t);
        scaleX = lerp(0.40, 0.25, t);
        xPos = SCREEN_W / 2 + sign * lerp(FAR_OFFSET, SCREEN_W / 2 + 30, t);
        brightness = lerp(0.35, 0.0, t);
      }

      return { height, scaleX, xPos, brightness };
    }

    function draw_ui() {
      // Dark gradient background
      const grad = ctx.createLinearGradient(0, 0, 0, SCREEN_H);
      grad.addColorStop(0, '#0a0a14');
      grad.addColorStop(0.5, '#0d0d1a');
      grad.addColorStop(1, '#060610');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

      const centerY = SCREEN_H / 2 - 10;

      // Reflective floor line
      const floorY = centerY + CENTER_SIZE / 2 + 12;
      const lineGrad = ctx.createLinearGradient(40, floorY, SCREEN_W - 40, floorY);
      lineGrad.addColorStop(0, 'rgba(255,255,255,0)');
      lineGrad.addColorStop(0.3, 'rgba(255,255,255,0.06)');
      lineGrad.addColorStop(0.5, 'rgba(255,255,255,0.1)');
      lineGrad.addColorStop(0.7, 'rgba(255,255,255,0.06)');
      lineGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = lineGrad;
      ctx.fillRect(30, floorY, SCREEN_W - 60, 1);

      // Collect and sort albums (painter's algorithm)
      const items = [];
      for (let i = 0; i < ALBUM_COUNT; i++) {
        const offset = i - scroll_pos;
        const tf = getCoverFlowTransform(offset);
        if (tf.brightness > 0.01 && tf.height > 5) {
          items.push({ index: i, offset, ...tf });
        }
      }
      items.sort((a, b) => Math.abs(b.offset) - Math.abs(a.offset));

      // Draw albums
      for (const item of items) {
        drawAlbumArt(item.xPos, centerY, item.height, item.scaleX,
          albumColors[item.index], item.index, item.brightness);
      }

      // Center album name (fades in/out)
      const centerIndex = Math.round(scroll_pos);
      const clamped = Math.max(0, Math.min(ALBUM_COUNT - 1, centerIndex));
      const nameAlpha = 1.0 - Math.min(1, Math.abs(scroll_pos - clamped) * 3);

      if (nameAlpha > 0.05) {
        ctx.fillStyle = `rgba(255,255,255,${nameAlpha})`;
        ctx.font = '600 14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(albumNames[clamped], SCREEN_W / 2, centerY + CENTER_SIZE / 2 + 18);
      }

      // Dot indicators
      const dotY = SCREEN_H - 12;
      for (let i = 0; i < ALBUM_COUNT; i++) {
        ctx.fillStyle = Math.abs(i - scroll_pos) < 0.5 ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(SCREEN_W / 2 + (i - (ALBUM_COUNT - 1) / 2) * 14, dotY, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ====== TOUCH / PHYSICS (more fluid) ======

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const tx = (e.clientX - rect.left) * (SCREEN_W / rect.width);
      is_dragging = true;
      touch_start_x = tx; last_tx = tx;
      scroll_start = scroll_pos;
      touch_start_time = performance.now();
      momentum_velocity = 0;
      canvas.style.cursor = 'grabbing';
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!is_dragging) return;
      const rect = canvas.getBoundingClientRect();
      const tx = (e.clientX - rect.left) * (SCREEN_W / rect.width);
      const dx = tx - touch_start_x;
      scroll_pos = scroll_start - dx / DRAG_SENSITIVITY;
      momentum_velocity = (last_tx - tx) / DRAG_SENSITIVITY;
      last_tx = tx;
      if (scroll_pos < -OVERSCROLL) scroll_pos = -OVERSCROLL;
      if (scroll_pos > ALBUM_COUNT - 1 + OVERSCROLL) scroll_pos = ALBUM_COUNT - 1 + OVERSCROLL;
      target_scroll = scroll_pos;
    });

    function handleRelease(tx, ty) {
      if (!is_dragging) return;
      is_dragging = false;
      canvas.style.cursor = 'grab';
      const duration = performance.now() - touch_start_time;
      const totalDrag = Math.abs(scroll_pos - scroll_start);

      if (totalDrag < 0.06 && duration < 300) {
        const ci = Math.round(scroll_pos);
        if (ci >= 0 && ci < ALBUM_COUNT) {
          statusEl.innerHTML = `Tapped: <span class="album-name">${albumNames[ci]}</span> — spotify_play_album()`;
        }
        target_scroll = Math.round(scroll_pos);
        return;
      }

      target_scroll = scroll_pos + momentum_velocity * MOMENTUM_MULT;
      target_scroll = Math.max(0, Math.min(ALBUM_COUNT - 1, target_scroll));
      let closest = Math.round(target_scroll);
      closest = Math.max(0, Math.min(ALBUM_COUNT - 1, closest));
      target_scroll = closest;
      statusEl.innerHTML = `Snapping to: <span class="album-name">${albumNames[closest]}</span>`;
    }

    canvas.addEventListener('mouseup', (e) => {
      const rect = canvas.getBoundingClientRect();
      handleRelease((e.clientX - rect.left) * (SCREEN_W / rect.width), (e.clientY - rect.top) * (SCREEN_H / rect.height));
    });
    canvas.addEventListener('mouseleave', () => { if (is_dragging) handleRelease(0, 0); });

    // Touch events
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      const tx = (t.clientX - rect.left) * (SCREEN_W / rect.width);
      is_dragging = true; touch_start_x = tx; last_tx = tx;
      scroll_start = scroll_pos; touch_start_time = performance.now(); momentum_velocity = 0;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault(); if (!is_dragging) return;
      const rect = canvas.getBoundingClientRect();
      const tx = (e.touches[0].clientX - rect.left) * (SCREEN_W / rect.width);
      scroll_pos = scroll_start - (tx - touch_start_x) / DRAG_SENSITIVITY;
      momentum_velocity = (last_tx - tx) / DRAG_SENSITIVITY;
      last_tx = tx;
      if (scroll_pos < -OVERSCROLL) scroll_pos = -OVERSCROLL;
      if (scroll_pos > ALBUM_COUNT - 1 + OVERSCROLL) scroll_pos = ALBUM_COUNT - 1 + OVERSCROLL;
      target_scroll = scroll_pos;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const t = e.changedTouches[0];
      handleRelease((t.clientX - rect.left) * (SCREEN_W / rect.width), (t.clientY - rect.top) * (SCREEN_H / rect.height));
    }, { passive: false });

    // ====== ANIMATION ======

    let lastSP = -999;
    function animate() {
      if (!is_dragging && Math.abs(scroll_pos - target_scroll) > 0.001) {
        const diff = target_scroll - scroll_pos;
        const speed = slowMotion ? 12 : EASE_SPEED;
        scroll_pos += diff / speed;
        if (Math.abs(diff) < 0.003) scroll_pos = target_scroll;
      }
      if (scroll_pos !== lastSP || is_dragging) { draw_ui(); lastSP = scroll_pos; }
      requestAnimationFrame(animate);
    }

    function goToAlbum(i) { target_scroll = i; statusEl.innerHTML = `<span class="album-name">${albumNames[i]}</span>`; }
    function toggleSlowMotion() { slowMotion = !slowMotion; statusEl.textContent = slowMotion ? '🐢 Slow-motion ON' : 'Normal speed'; }

    draw_ui(); animate();
  </script>
</body>

</html>
